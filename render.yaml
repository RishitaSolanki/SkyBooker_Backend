version: "1"

databases:
  - name: skybooker-db
      databaseName: skybooker
          user: skybooker
              plan: free

              services:
                # 1. AuthService
                  - type: web
                      name: skybooker-auth
                          env: docker
                              plan: free
                                  dockerContext: .
                                      dockerfilePath: SkyBooker/SkyBooker.AuthService/Dockerfile
                                          envVars:
                                                - key: ConnectionStrings__DefaultConnection
                                                        fromDatabase:
                                                                  name: skybooker-db
                                                                            property: connectionString

                                                                              # 2. FlightService
                                                                                - type: web
                                                                                    name: skybooker-flight
                                                                                        env: docker
                                                                                            plan: free
                                                                                                dockerContext: .
                                                                                                    dockerfilePath: SkyBooker/SkyBooker.FlightService/Dockerfile
                                                                                                        envVars:
                                                                                                              - key: ConnectionStrings__DefaultConnection
                                                                                                                      fromDatabase:
                                                                                                                                name: skybooker-db
                                                                                                                                          property: connectionString
                                                                                                                                          
                                                                                                                                            # 3. BookingService
                                                                                                                                              - type: web
                                                                                                                                                  name: skybooker-booking
                                                                                                                                                      env: docker
                                                                                                                                                          plan: free
                                                                                                                                                              dockerContext: .
                                                                                                                                                                  dockerfilePath: SkyBooker/SkyBooker.BookingService/Dockerfile
                                                                                                                                                                      envVars:
                                                                                                                                                                            - key: ConnectionStrings__DefaultConnection
                                                                                                                                                                                    fromDatabase:
                                                                                                                                                                                              name: skybooker-db
                                                                                                                                                                                                        property: connectionString
                                                                                                                                                                                                        
                                                                                                                                                                                                          # 4. SeatService
                                                                                                                                                                                                            - type: web
                                                                                                                                                                                                                name: skybooker-seat
                                                                                                                                                                                                                    env: docker
                                                                                                                                                                                                                        plan: free
                                                                                                                                                                                                                            dockerContext: .
                                                                                                                                                                                                                                dockerfilePath: SkyBooker/SkyBooker.SeatService/Dockerfile
                                                                                                                                                                                                                                    envVars:
                                                                                                                                                                                                                                          - key: ConnectionStrings__DefaultConnection
                                                                                                                                                                                                                                                  fromDatabase:
                                                                                                                                                                                                                                                            name: skybooker-db
                                                                                                                                                                                                                                                                      property: connectionString
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                        # 5. PassengerService
                                                                                                                                                                                                                                                                          - type: web
                                                                                                                                                                                                                                                                              name: skybooker-passenger
                                                                                                                                                                                                                                                                                  env: docker
                                                                                                                                                                                                                                                                                      plan: free
                                                                                                                                                                                                                                                                                          dockerContext: .
                                                                                                                                                                                                                                                                                              dockerfilePath: SkyBo
