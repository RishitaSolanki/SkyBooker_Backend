version: "1"

databases:
  - name: skybooker-db
    databaseName: skybooker
    user: skybooker
    plan: free

services:
  # 1. AuthService
  - type: web
    name: skybooker-auth
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: SkyBooker/SkyBooker.AuthService/Dockerfile
    envVars:
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: skybooker-db
          property: connectionString

  # 2. FlightService
  - type: web
    name: skybooker-flight
    env: docker
    plan: free
