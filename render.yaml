version: "1"

databases:
  - name: skybooker-db
    databaseName: skybooker
    user: skybooker
    plan: free

services:
  # 1. AuthService
  - type: web
    name: skybooker-auth
    env: dotnet
    plan: free
    buildCommand: dotnet publish SkyBooker/SkyBooker.AuthService -c Release -o ./out
    startCommand: dotnet ./out/SkyBooker.AuthService.dll
    envVars:
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: skybooker-db
          property: connectionString

  # 2. FlightService
